services:
  bot:
    build: .
    container_name: alias-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Монтируем словари отдельно для удобства
      - ./dictionaries:/app/dictionaries
      # Монтируем корень проекта в подпапку контейнера для хранения данных
      - ./:/app/persistent
    environment:
      # Эти пути будут приоритетными для Docker
      - DICT_PATH=/app/dictionaries/
      - USER_DATA_FILE=/app/persistent/user_data.json
      - PYTHONUNBUFFERED=1
