services:
  bot:
    build: .
    container_name: alias-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Монтируем словари прямо из репозитория (уже есть в проекте)
      - ./dictionaries:/app/dictionaries
      # Монтируем папку для данных (Docker создаст её сам, если нет)
      - ./data:/app/data
    environment:
      - DICT_PATH=/app/dictionaries/
      - USER_DATA_FILE=/app/data/user_data.json
      - PYTHONUNBUFFERED=1
